<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date?</title>
    <link rel="stylesheet" href="style.css">

    
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Bellota+Text:ital,wght@1,300&family=Poppins:wght@400;700&family=Roboto:wght@400;700&display=swap');

        *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Bellota Text', sans-serif;
    
}
body, html{
    width: 100%;
    height: 100vh;
    background-image: url("https://img.freepik.com/free-vector/cloud-background-vector-cute-desktop-wallpaper_53876-136885.jpg?w=826&t=st=1704789857~exp=1704790457~hmac=381926ab355f58892a476af4dd9c1b104192572bd7b1a38ac49528094d2ec6ce");

    background-size:cover;
}

.confirmation{
    display: none;
    width: 400px;
    height: 500px;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%,-50%);
    text-align: center;
    /* padding-top: 50px; */
}

.date-picker-section{
    display: none;
    width: 400px;
    height: auto;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%,-50%);
    text-align: center;
    padding: 30px;
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    border: 2px solid rgba(147, 77, 77, 0.3);
}

.date-picker-section h1{
    font-size: 40px;
    font-weight: 700;
    text-shadow: 0px 3px 6px rgb(147, 77, 77);
    margin-bottom: 20px;
}

.date-input{
    width: 100%;
    padding: 15px;
    font-size: 18px;
    border: 2px solid rgba(147, 77, 77, 0.5);
    border-radius: 10px;
    margin-bottom: 20px;
    font-family: 'Bellota Text', sans-serif;
    background: rgba(255, 255, 255, 0.8);
}

.activity-section{
    display: none;
    width: 450px;
    max-height: 90vh;
    overflow-y: auto;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%,-50%);
    text-align: center;
    padding: 30px;
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    border: 2px solid rgba(147, 77, 77, 0.3);
}

.activity-section h1{
    font-size: 35px;
    font-weight: 700;
    text-shadow: 0px 3px 6px rgb(147, 77, 77);
    margin-bottom: 25px;
}

.activity-list{
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-bottom: 25px;
}

.activity-option{
    display: flex;
    align-items: center;
    padding: 15px;
    background: rgba(255, 255, 255, 0.5);
    border: 2px solid rgba(147, 77, 77, 0.3);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 20px;
    font-weight: 550;
}

.activity-option:hover{
    background: rgba(255, 255, 255, 0.7);
    box-shadow: 0px 4px 8px rgba(147, 77, 77, 0.3);
}

.activity-option input[type="radio"]{
    margin-right: 15px;
    width: 20px;
    height: 20px;
    cursor: pointer;
}

.activity-option span{
    flex: 1;
    text-align: left;
}

.confirmation h1{
    font-style: bolder;
    font-size: 50px;
    font-weight: 700;
    text-shadow: 0px 3px 6px rgb(147, 77, 77);
    line-height: 90px;
}

.fix-gif{

    display: flex;
    justify-content: center;
    align-items: center;
    width:100%;
    height: 200px;
    

}

.fix-gifimg{
    border-radius: 10px;
    width: 384px;
    height: 216px;
    background-image: url("https://media1.tenor.com/m/2VprHA868S8AAAAC/yummy-desserts-desserts-milk-mocha.gif");
    background-size: cover; 
}

.container h1{
    margin-bottom: 20px;
    margin-top: 50px;
    font-style: bolder;
    font-size: 50px;
    font-weight: 700;
    text-shadow: 0px 3px 6px rgb(147, 77, 77);
}

#fix{
    margin-top: 30px;
        border: none;
        width: 400px;
        height: 50px;
        font-size: 30px;
        border-radius: 10px;
        background: none;
        backdrop-filter: blur(5px);
        border: 1px solid black;
        font-weight: 550;
}
.container{
    width: 400px;
    height: 500px;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%,-50%);
    text-align: center;
    
}

.gif{

    display: flex;
    justify-content: center;
    align-items: center;
    width:100%;
    height: 300px;
    

}

.gifimg{
    border-radius: 10px;
    width: 384px;
    height: 254px;
    background-image: url("https://media1.tenor.com/m/UAFrdZCt29YAAAAC/milk-and-mocha-waiting-for-reply.gif");
    background-size: cover; 
}

.answer-box{
    display: flex;
    justify-content: space-evenly;
    align-items: center;
    /* background-color: black; */
    padding: 10px;
    margin-top: 5px;
    width: 100%;
    height: 80px;
    gap: 50px;
}

.answer{
    border: none;
    width: 100px;
    height: 50px;
    font-size: 30px;
    border-radius: 10px;
    background: none;
    backdrop-filter: blur(5px);
    border: 1px solid black;
    font-weight: 550;
    
}
.answer:hover{
    box-shadow: inset 0px 3px 6px rgba(0, 0, 0, 0.449);
}

@media screen and (max-width: 600px){
    .container{
        width: 100%;
    }
    .container h1{
        margin-top: 20px;
        padding: 8px;
        font-size: 35px;
    }
    .answer{
        font-size: 20px;
        padding: 5px;
    }
    .gifimg{
        border-radius: 10px;
        width: 300px;
        height: 198px;
        background-image: url("https://media1.tenor.com/m/UAFrdZCt29YAAAAC/milk-and-mocha-waiting-for-reply.gif");
        background-size: cover; 
    }
    .fix-gif{
        display: flex;
        justify-content: center;
        align-items: center;
        width:100%;
        height: 200px;
        
    
    }
    
    .fix-gifimg{
        border-radius: 10px;
        width: 300px;
        height: 168px;
        background-image: url("https://media1.tenor.com/m/2VprHA868S8AAAAC/yummy-desserts-desserts-milk-mocha.gif");
        background-size: cover; 
    }

    #fix{
        margin-top: 30px;
            border: none;
            width: 250px;
            height: 50px;
            font-size: 30px;
            border-radius: 10px;
            background: none;
            backdrop-filter: blur(5px);
            border: 1px solid black;
            font-weight: 550;
    }

    .confirmation{
        display: none;
        width: 100%;
        height: 500px;
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%,-50%);
        text-align: center;
    }

    .date-picker-section{
        width: 90%;
        padding: 20px;
    }

    .date-picker-section h1{
        font-size: 30px;
    }

    .activity-section{
        width: 90%;
        padding: 20px;
    }

    .activity-section h1{
        font-size: 28px;
    }

    .activity-option{
        font-size: 18px;
        padding: 12px;
    }
}

header {
    width: 100%;
    text-align: center;
    padding: 20px 0;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1000;
    background: rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(10px);
    border-bottom: 2px solid rgba(147, 77, 77, 0.3);
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

header h2 {
    font-size: 32px;
    font-weight: 700;
    color: #8B4444;
    text-shadow: 2px 2px 4px rgba(147, 77, 77, 0.3);
    letter-spacing: 1px;
}

@media screen and (max-width: 600px){
    header h2 {
        font-size: 24px;
        padding: 0 10px;
    }
}

    
    </style>
    </style>
</head>
<body>
    <header>
        <h2>To Momami❤️ from your Ani</h2>
    </header>
    <div class="container">
        <div class="question">
            <h1>Will you go on a date with me?</h1>
        </div>
        <div class="gif">
            <div class="gifimg"></div>
        </div>
        <div class="answer-box">
                <button class="answer" id="yes">Yes!!!</button>
                <button class="answer" id="no">No</button>
        </div>
        
    </div>

    <div class="confirmation">
        <h1>Yayyyyyyyy!!! Finally</h1>
            <div class="question">
                <div class="fix-gif">
                    <div class="fix-gifimg"></div>
                </div>
                    <button class="answer" id="fix">Let's Plan a date</button>
            </div>
    </div>

    <div class="date-picker-section">
        <h1>Pick a Date! 📅</h1>
        <input type="date" id="dateSelector" class="date-input">
        <button class="answer" id="continueBtn">Continue</button>
    </div>

    <div class="activity-section">
        <h1>What should we do together? 💕</h1>
        <div class="activity-list">
            <label class="activity-option">
                <input type="radio" name="activity" value="Food and yap">
                <span>Food and yap 🍽️</span>
            </label>
            <label class="activity-option">
                <input type="radio" name="activity" value="Movie date">
                <span>Movie date 🎬</span>
            </label>
            <label class="activity-option">
                <input type="radio" name="activity" value="Virtual movie date">
                <span>Virtual movie date 💻</span>
            </label>
            <label class="activity-option">
                <input type="radio" name="activity" value="Cafe Hopping">
                <span>Cafe Hopping ☕</span>
            </label>
            <label class="activity-option">
                <input type="radio" name="activity" value="Bike rides">
                <span>Bike rides 🏍️</span>
            </label>
            <label class="activity-option">
                <input type="radio" name="activity" value="Shopping date">
                <span>Shopping date 🛍️</span>
            </label>
            <label class="activity-option">
                <input type="radio" name="activity" value="Gangar ghat e prem">
                <span>Gangar ghat e prem 🌊</span>
            </label>
        </div>
        <button class="answer" id="sendWhatsApp">Send to WhatsApp 💬</button>
    </div>

    </div>

    <script>
        const yes = document.querySelector("#yes");
        const no = document.querySelector("#no");
        const confirmation = document.querySelector(".confirmation");
        const container = document.querySelector(".container");
        const datePickerSection = document.querySelector(".date-picker-section");
        const activitySection = document.querySelector(".activity-section");
        const dateSelector = document.querySelector("#dateSelector");
        const continueBtn = document.querySelector("#continueBtn");
        const sendWhatsAppBtn = document.querySelector("#sendWhatsApp");

        let selectedDate = "";
        let selectedActivity = "";

        yesAnswerMethod = () => {
            container.style.display = 'none'
            confirmation.style.display = 'block'
        }

        noAnswerMethod = () => {
            no.style.position = 'absolute'

            xPosition = Math.floor(Math.random() * container.clientWidth)
            yPosition = Math.floor(Math.random() * container.clientHeight)

            no.style.top = `${yPosition}px`
            no.style.left = `${xPosition}px`
        }

        no.addEventListener('click', noAnswerMethod)
        yes.addEventListener('click', yesAnswerMethod)

        // Show date picker when "Let's Plan a date" is clicked
        document.getElementById("fix").addEventListener("click", function(){
            confirmation.style.display = 'none'
            datePickerSection.style.display = 'block'
        });

        // Continue to activity selection
        continueBtn.addEventListener("click", function(){
            selectedDate = dateSelector.value;
            if(!selectedDate){
                alert("Please select a date first! 📅");
                return;
            }
            datePickerSection.style.display = 'none'
            activitySection.style.display = 'block'
        });

        // Send WhatsApp message with date and activity
        sendWhatsAppBtn.addEventListener("click", function(){
            const activityRadio = document.querySelector('input[name="activity"]:checked');
            
            if(!activityRadio){
                alert("Please select an activity! 💕");
                return;
            }
            
            selectedActivity = activityRadio.value;
            
            // Format the date to be more readable
            const dateObj = new Date(selectedDate);
            const formattedDate = dateObj.toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            
            const message = `Lets go on a date, I miss you !!!!!\n\nWe can go on ${formattedDate} and we can do ${selectedActivity}.`;
            const encodedMessage = encodeURIComponent(message);
            
            window.location = `https://wa.me/+916295473099?text=${encodedMessage}`;
        });
    </script>
    
</body>
</html>
